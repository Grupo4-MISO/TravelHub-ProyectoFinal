apiVersion: v1
kind: Service
metadata:
  name: auth-app-service
  labels:
    app: auth-app
spec:
  type: NodePort
  selector:
    app: auth-app
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}          # Service port
      targetPort: {{ .Values.port }}     # Container port
      nodePort: {{ .Values.nodePort }}   # External port (30000-32767)