version: 0.2

phases:
  install:
    commands:
      - echo Installing tools...

      - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      - curl -LO "https://storage.googleapis.com/kubernetes-release/release/$(curl -s https://storage.googleapis.com/kubernetes-release/release/stable.txt)/bin/linux/amd64/kubectl"
      - chmod +x kubectl
      - mv kubectl /usr/local/bin/

  pre_build:
    commands:
      - aws eks update-kubeconfig --region us-east-1 --name proyecto-final-grupo-4
      - export KUBECONFIG=$HOME/.kube/config
      - kubectl get nodes
      - IMAGE_URI=$(jq -r '.image_uri' autenticadorapp/imageDetail.json)
      - IMAGE_REPO=$(echo $IMAGE_URI | cut -d ':' -f1)
      - IMAGE_TAG=$(echo $IMAGE_URI | cut -d ':' -f2)

  build:
    commands:
      - helm upgrade --install auth-app ./autenticadorapp/chart \
          --set image.repository=$IMAGE_REPO \
          --set image.tag=$IMAGE_TAG \
          --kubeconfig $KUBECONFIG
      - kubectl apply -f k8s/gateway-ingress.yaml