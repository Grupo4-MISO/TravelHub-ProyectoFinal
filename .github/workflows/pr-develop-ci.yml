name: PR Build and Unit Tests

on:
  pull_request:
    branches:
      - develop

jobs:
  python-validate-and-test:
    name: Validate and Test (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: busquedas_app
            path: busquedas_app
            tests_path: tests
          - name: inventario_app
            path: inventario_app
            tests_path: tests
          - name: reserva_app
            path: reserva_app
            tests_path: tests
          - name: comentariosapp
            path: comentariosapp
            tests_path: tests
          - name: autenticadorapp
            path: autenticadorapp
            tests_path: tests
          - name: proveedoresapp
            path: proveedoresapp
            tests_path: tests
          - name: transaccionesapp
            path: transaccionesapp
            tests_path: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        working-directory: ${{ matrix.service.path }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Validate Python compile
        run: python -m compileall ${{ matrix.service.path }}

      - name: Run unit tests
        working-directory: ${{ matrix.service.path }}
        env:
          PYTHONPATH: .
        run: pytest ${{ matrix.service.tests_path }} -v

  docker-build:
    name: Docker Build (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: busquedas_app
            path: busquedas_app
          - name: inventario_app
            path: inventario_app
          - name: reserva_app
            path: reserva_app
          - name: comentariosapp
            path: comentariosapp
          - name: autenticadorapp
            path: autenticadorapp
          - name: proveedoresapp
            path: proveedoresapp
          - name: transaccionesapp
            path: transaccionesapp
            
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ matrix.service.name }}:pr-${{ github.sha }} ${{ matrix.service.path }}

  required-checks:
    name: Required Checks
    runs-on: ubuntu-latest
    needs:
      - python-validate-and-test
      - docker-build
    if: always()

    steps:
      - name: Verify upstream jobs
        env:
          PYTHON_VALIDATE_RESULT: ${{ needs.python-validate-and-test.result }}
          DOCKER_BUILD_RESULT: ${{ needs.docker-build.result }}
        run: |
          echo "python-validate-and-test => ${PYTHON_VALIDATE_RESULT}"
          echo "docker-build => ${DOCKER_BUILD_RESULT}"

          if [ "${PYTHON_VALIDATE_RESULT}" != "success" ] || [ "${DOCKER_BUILD_RESULT}" != "success" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi

          echo "All required jobs passed."
