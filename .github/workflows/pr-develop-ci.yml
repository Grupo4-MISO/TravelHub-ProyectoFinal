name: PR Build and Unit Tests

on:
  pull_request:
    branches:
      - develop

jobs:
  python-validate-and-test:
    name: Validate and Test (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: busquedas_app
            path: busquedas_app
            tests_path: tests
          - name: inventario_app
            path: inventario_app
            tests_path: tests
          - name: reserva_app
            path: reserva_app
            tests_path: tests
          - name: comentariosapp
            path: comentariosapp
            tests_path: tests
          - name: autenticadorapp
            path: autenticadorapp
            tests_path: tests
          - name: proveedoresapp
            path: proveedoresapp
            tests_path: tests
          - name: transaccionesapp
            path: transaccionesapp
            tests_path: tests
          - name: clientesapp
            path: clientesapp
            tests_path: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        working-directory: ${{ matrix.service.path }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Validate Python compile
        run: python -m compileall ${{ matrix.service.path }}

      - name: Run unit tests
        working-directory: ${{ matrix.service.path }}
        env:
          PYTHONPATH: .
        run: pytest ${{ matrix.service.tests_path }} -v