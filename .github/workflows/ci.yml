name: CI - Per-service Tests

on:
  push:
    branches: [ main, master, hot_fix ]
  pull_request:
    branches: [ main, master, hot_fix ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SQLALCHEMY_DATABASE_URI: 'sqlite:///:memory:'
      SQLALCHEMY_TRACK_MODIFICATIONS: "false"
      DATABASE_URL: 'sqlite:///:memory:'
    strategy:
      matrix:
        service: [autenticadorapp, reserva_app, transaccionesapp, clientesapp, comentariosapp, inventario_app, proveedoresapp, busquedas_app]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run per-service tests
        run: |
          echo "Running tests for ${{ matrix.service }}"
          python -m pytest -q ${{ matrix.service }}/tests
