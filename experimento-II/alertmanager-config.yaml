alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 12h
      receiver: 'null'
      # IMPORTANTE: 'routes' debe ir indentado DENTRO de 'route'
      routes:
        - receiver: 'slack-notifications'
          matchers:
            - severity="critical"
    receivers:
    - name: 'null'
    - name: 'slack-notifications'
      slack_configs:
      - api_url: ''
        channel: '#travel-hub'
        send_resolved: true
