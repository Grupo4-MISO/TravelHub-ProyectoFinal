apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-observability-experiment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-observability-experiment
  template:
    metadata:
      labels:
        app: k8s-observability-experiment
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: app
          image: k8s-observability-experiment:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-observability-experiment
spec:
  selector:
    app: k8s-observability-experiment
  ports:
    - name: http
      port: 80
      targetPort: 8000
