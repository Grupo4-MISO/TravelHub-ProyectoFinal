apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-app
  labels:
    app: users-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: users-app
  template:
    metadata:
      labels:
        app: users-app
    spec:
      containers:
      - name: users-api
        image: 654654235979.dkr.ecr.us-east-1.amazonaws.com/users-app:v1.0.0
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          value: postgresql://proyectogrupo4:proyectogrupo4@terraform-20250928192204952500000001.cp4iaucce7um.us-east-1.rds.amazonaws.com:5432/proyect_db
        - name: SECRET_TOKEN
          value: a547f980-b095-4874-b6b4-b0deb5574fae
        - name: TOPIC_EMAIL
          value: arn:aws:sns:us-east-1:654654235979:mail_topic
        - name: USERS_WEBHOOK
          value: https://wchxg5j6rlxbetcvxtydqjcwcm0zsumx.lambda-url.us-east-1.on.aws
        - name: TRUE_NATIVE
          value: http://service-truenative:80
        readinessProbe:
          httpGet:
            path: users/ping
            port: 3001
        livenessProbe:
          httpGet:
            path: users/ping
            port: 3001
          initialDelaySeconds: 5 
          periodSeconds: 30
          failureThreshold: 3
