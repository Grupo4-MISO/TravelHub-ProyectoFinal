apiVersion: apps/v1
kind: Deployment
metadata:
  name: proveedores-app
  labels:
    app: proveedores-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proveedores-app
  template:
    metadata:
      labels:
        app: proveedores-app
    spec:
      containers:
      - name: proveedores-api
        image: 387050840675.dkr.ecr.us-east-1.amazonaws.com/proveedores-app:v1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 3007
        env:
        - name: DATABASE_URL
          value: postgresql://proyectogrupo4:proyectogrupo4@terraform-20260421014259848900000001.cifuwoics1ov.us-east-1.rds.amazonaws.com:5432/proyect_db
        - name: AUTH_SERVICE_URL
          value: http://auth-app-service:80
        readinessProbe:
          httpGet:
            path: api/v1/Managers/health
            port: 3007
        livenessProbe:
          httpGet:
            path: api/v1/Managers/health
            port: 3007
          initialDelaySeconds: 5 
          periodSeconds: 30
          failureThreshold: 3
