apiVersion: apps/v1
kind: Deployment
metadata:
  name: clientes-app
  labels:
    app: clientes-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clientes-app
  template:
    metadata:
      labels:
        app: clientes-app
    spec:
      containers:
      - name: clientes-api
        image: 387050840675.dkr.ecr.us-east-1.amazonaws.com/clientes-app:v1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 3006
        env:
        - name: DATABASE_URL
          value: postgresql://proyectogrupo4:proyectogrupo4@terraform-20260426211023287000000001.cifuwoics1ov.us-east-1.rds.amazonaws.com:5432/proyect_db
        - name: AUTH_SERVICE_URL
          value: http://auth-app-service:80
        readinessProbe:
          httpGet:
            path: api/v1/Travelers/health
            port: 3006
        livenessProbe:
          httpGet:
            path: api/v1/Travelers/health
            port: 3006
          initialDelaySeconds: 5 
          periodSeconds: 30
          failureThreshold: 3
