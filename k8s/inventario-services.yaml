apiVersion: v1
kind: Service
metadata:
  name: inventarios-app-service
  labels:
    app: inventarios-app
spec:
  type: NodePort
  selector:
    app: inventarios-app
  ports:
    - protocol: TCP
      port: 80          # Service port
      targetPort: 3000  # Container port
      nodePort: 30000   # External port (30000-32767)