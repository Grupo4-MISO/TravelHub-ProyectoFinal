apiVersion: apps/v1
kind: Deployment
metadata:
  name: tarifas-app
  labels:
    app: tarifas-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: tarifas-app
  template:
    metadata:
      labels:
        app: tarifas-app
    spec:
      containers:
      - name: tarifas-api
        image: 387050840675.dkr.ecr.us-east-1.amazonaws.com/tarifas-app:v1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 3008
        env:
        - name: DATABASE_URL
          value: postgresql://proyectogrupo4:proyectogrupo4@terraform-20260426211023287000000001.cifuwoics1ov.us-east-1.rds.amazonaws.com:5432/proyect_db
        readinessProbe:
          httpGet:
            path: api/v1/tarifas/health
            port: 3008
        livenessProbe:
          httpGet:
            path: api/v1/tarifas/health
            port: 3008
          initialDelaySeconds: 5 
          periodSeconds: 30
          failureThreshold: 3
