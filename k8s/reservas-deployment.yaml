apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservas-app
  labels:
    app: reservas-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reservas-app
  template:
    metadata:
      labels:
        app: reservas-app
    spec:
      containers:
      - name: reservas-api
        image: 387050840675.dkr.ecr.us-east-1.amazonaws.com/reservas-app:v1.0.0
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          value: postgresql://proyectogrupo4:proyectogrupo4@terraform-20250928192204952500000001.cp4iaucce7um.us-east-1.rds.amazonaws.com:5432/proyect_db
        readinessProbe:
          httpGet:
            path: reservas/ping
            port: 3001
        livenessProbe:
          httpGet:
            path: reservas/ping
            port: 3001
          initialDelaySeconds: 5 
          periodSeconds: 30
          failureThreshold: 3
