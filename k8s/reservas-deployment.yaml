apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservas-app
  labels:
    app: reservas-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reservas-app
  template:
    metadata:
      labels:
        app: reservas-app
    spec:
      containers:
      - name: reservas-api
        image: 387050840675.dkr.ecr.us-east-1.amazonaws.com/reservas-app:v28.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          value: postgresql://proyectogrupo4:proyectogrupo4@terraform-20260426211023287000000001.cifuwoics1ov.us-east-1.rds.amazonaws.com:5432/proyect_db
        - name: REDIS_HOST
          value: master.name.igqc6u.use1.cache.amazonaws.com
        - name: ONE_SIGNAL_APP_ID
          value: 4a46cf3a-a9ec-456b-b382-de8793e5f38b
        - name: ONE_SIGNAL_API_KEY
          value: os_v2_app_jjdm6ovj5rcwxm4c32dzhzptromybqnfywtewa5pcuxatng6xjw3aguqoby526qojrhwzauyjcp42q5rcpaxag4f5aegits267v5hly
        - name: INVENTARIOS_URL
          value: http://inventarios-app-service:80
        readinessProbe:
          httpGet:
            path: api/v1/reservas/health
            port: 3001
        livenessProbe:
          httpGet:
            path: api/v1/reservas/health
            port: 3001
          initialDelaySeconds: 5 
          periodSeconds: 30
          failureThreshold: 3
