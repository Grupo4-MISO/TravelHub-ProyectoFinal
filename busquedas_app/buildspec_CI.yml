version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-east-1
    REPOSITORY_URI: 387050840675.dkr.ecr.us-east-1.amazonaws.com/busquedas-app

phases:
  pre_build:
    commands:
      - echo "Installing dependencies and running tests..."
      - export PYTHONPATH=.
      - python -m pip install --upgrade pip
      - pip install -r requirements.txt
      - pytest tests/ -v

      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REPOSITORY_URI

      - echo "Setting image tag..."
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - echo "IMAGE_TAG=$IMAGE_TAG"

  build:
    commands:
      - echo "Build started on $(date)"
      - echo "Building Docker image..."
      - docker build -t busquedas-app:$IMAGE_TAG .

      - echo "Tagging Docker image..."
      - docker tag busquedas-app:$IMAGE_TAG $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo "Build completed on $(date)"
      - echo "Pushing Docker image..."
      - docker push $REPOSITORY_URI:$IMAGE_TAG

      - echo "Writing image detail artifact..."
      - printf '{"image_uri":"%s"}' "$REPOSITORY_URI:$IMAGE_TAG" > imageDetail.json
      - cat imageDetail.json

artifacts:
  files:
    - imageDetail.json